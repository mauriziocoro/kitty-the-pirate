<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kitty the Pirate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0A0515;font-family:monospace;display:flex;align-items:center;justify-content:center;overflow:hidden}
#card{background:rgba(12,6,28,0.97);border:2px solid #C8960C;border-radius:14px;padding:36px 40px;text-align:center;max-width:420px;width:90%}
h1{color:#FFD060;font-size:22px;margin-bottom:6px;letter-spacing:1px}
.sub{color:#C0A050;font-size:12px;margin-bottom:28px;line-height:1.7}
#autoMsg{color:#80C0FF;font-size:12px;margin-bottom:20px;min-height:18px}
.links{display:flex;flex-direction:column;gap:12px}
.lnk{display:block;padding:12px 20px;border-radius:7px;text-decoration:none;font-size:13px;font-weight:bold;letter-spacing:1px;transition:filter .15s}
.lnk:active,.lnk:hover{filter:brightness(1.25)}
.lnk-desk{background:#7A3800;color:#FFD040;border:2px solid #C8960C}
.lnk-mob{background:#143060;color:#80D0FF;border:2px solid #2060A0}
.lnk small{display:block;font-weight:normal;font-size:10px;opacity:0.75;margin-top:2px;letter-spacing:0}
#countdown{font-size:11px;color:#806040;margin-top:18px}
#bar{width:100%;height:3px;background:#1A0E05;border-radius:2px;margin-top:8px;overflow:hidden}
#barFill{height:100%;width:0%;background:#C8960C;transition:width .05s linear}
</style>
</head>
<body>
<div id="card">
  <h1>⚓ Kitty the Pirate ⚓</h1>
  <p class="sub">
    Gatta steampunk pirata · Dobloni · Scheletri<br>
    Doppio salto · Bonus invincibilità · Progressione vittorie
  </p>
  <div id="autoMsg">Rilevamento dispositivo...</div>
  <div class="links">
    <a class="lnk lnk-desk" href="game_v4.html" id="lnkDesk">
      🖥 Versione Desktop
      <small>Tastiera &amp; mouse · schermo largo</small>
    </a>
    <a class="lnk lnk-mob" href="game_mobile.html" id="lnkMob">
      📱 Versione Mobile
      <small>Joystick touch · schermo piccolo</small>
    </a>
  </div>
  <div id="countdown" style="display:none">
    Reindirizzamento automatico in <span id="sec">3</span>s
    <div id="bar"><div id="barFill"></div></div>
  </div>
</div>

<script>
// ── DEVICE DETECTION ──────────────────────────────────────────────
function detectMobile() {
  // 1. touch capability
  const hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 1;
  // 2. narrow viewport (phones / small tablets in portrait)
  const narrowScreen = window.innerWidth <= 900;
  // 3. user-agent as tiebreaker
  const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  // Consider mobile if touch + narrow, OR explicit mobile UA
  return (hasTouch && narrowScreen) || mobileUA;
}

const isMobile = detectMobile();
const target   = isMobile ? 'game_mobile.html' : 'game_v4.html';
const label    = isMobile ? 'Mobile' : 'Desktop';

document.getElementById('autoMsg').textContent =
  `Dispositivo rilevato: ${label}. Reindirizzamento in corso...`;

// Highlight the detected link
document.getElementById(isMobile ? 'lnkMob' : 'lnkDesk')
  .style.outline = '3px solid #FFD060';

// Countdown + progress bar
const cdEl  = document.getElementById('countdown');
const secEl = document.getElementById('sec');
const fill  = document.getElementById('barFill');
cdEl.style.display = 'block';

const TOTAL_MS = 3000;
const start = Date.now();

const tick = setInterval(() => {
  const elapsed  = Date.now() - start;
  const progress = Math.min(1, elapsed / TOTAL_MS);
  fill.style.width = (progress * 100) + '%';
  const remaining = Math.max(0, Math.ceil((TOTAL_MS - elapsed) / 1000));
  secEl.textContent = remaining;
  if (elapsed >= TOTAL_MS) {
    clearInterval(tick);
    window.location.href = target;
  }
}, 50);

// Allow manual cancel by clicking the other link
document.querySelectorAll('.lnk').forEach(a => {
  a.addEventListener('click', () => clearInterval(tick));
});
</script>
</body>
</html>
